<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h1 {
      margin: 0 0 20px 0;
      font-size: 18px;
      color: #333;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    button:hover {
      background: #357ae8;
    }
    button:active {
      background: #2a6fd8;
    }
    .status {
      margin-top: 10px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 4px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>TabNexus</h1>
  <p style="font-size: 12px; color: #666; margin: -15px 0 15px 0;">Auto Tab Grouper</p>
  <button id="groupBtn">Group Tabs Now</button>
  <button id="ungroupBtn">Ungroup All</button>
  <div id="status" class="status"></div>
  
  <script src="dist/popup.js"></script>
</body>
</html>
